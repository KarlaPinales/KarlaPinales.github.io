<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">

<body>

<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="favorites.html">Favorites</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="vacation.html">Dream Vacation</a></li>
    </ul>

<h1>Contact & Survey</h1>

<div class="box">
    <form>

        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <p>Which section did you like the most?</p>
        <input type="radio" name="favorite" value="home"> Home<br>
        <input type="radio" name="favorite" value="favorites"> Favorites<br>
        <input type="radio" name="favorite" value="vacation"> Dream Vacation<br>

        <label for="rating">Rate this website (1-5):</label>
        <select id="rating" name="rating">
            <option value="1">1 - Poor</option>
            <option value="2">2</option>
            <option value="3">3 - Average</option>
            <option value="4">4</option>
            <option value="5">5 - Excellent</option>
        </select>

        <label for="comments">Comments:</label>
        <textarea id="comments" name="comments" rows="4" placeholder="Write your thoughts here..."></textarea>

        <input type="submit" value="Submit">

    </form>
</div>

</body>
</html>
